name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Prepare build directory
        run: |
          mkdir -p apk-build
          cp .github/twa-manifest.json apk-build/twa-manifest.json

      - name: Generate keystore
        run: |
          cd apk-build
          keytool -genkey -v \
            -keystore android.keystore \
            -alias hr3d \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "HR3d2024!" \
            -keypass "HR3d2024!" \
            -dname "CN=Highway Racer, OU=Dev, O=HR3D, L=Istanbul, ST=Istanbul, C=TR"

      - name: Configure Bubblewrap (skip JDK prompts)
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Build APK with Bubblewrap
        run: |
          cd apk-build
          bubblewrap build --skipPwaValidation 2>&1
          echo "=== Build complete, searching for APK ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          find . -name "*.aab" 2>/dev/null || echo "No AAB found"
          ls -la

      - name: Find and copy APK
        run: |
          APK=$(find apk-build -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" highway-racer.apk
            echo "APK_FOUND=true" >> $GITHUB_ENV
            echo "Found APK: $APK"
          else
            echo "APK_FOUND=false" >> $GITHUB_ENV
            echo "WARNING: No APK generated"
            find apk-build -type f 2>/dev/null | head -20
          fi

      - name: Upload APK artifact
        if: env.APK_FOUND == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: highway-racer-apk
          path: highway-racer.apk

      - name: Create GitHub Release
        if: env.APK_FOUND == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Highway Racer 3D v1.0.${{ github.run_number }}
          body: |
            ## Android APK İndir

            **Highway Racer 3D** - 3D araba yarışı oyunu

            ### Kurulum Adımları
            1. `highway-racer.apk` dosyasını indirin
            2. Telefon Ayarları → Güvenlik → **Bilinmeyen kaynaklardan yükleme**'yi açın
            3. APK dosyasına dokunarak kurulumu başlatın

            > Minimum Android 7.0 (API 24) gerektirir
          files: highway-racer.apk
          fail_on_unmatched_files: false
          draft: false
