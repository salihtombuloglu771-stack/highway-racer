<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#111"/>
  <rect x="60" y="220" width="392" height="72" rx="8" fill="#333"/>
  <rect x="80" y="228" width="352" height="56" rx="4" fill="#444"/>
  <!-- Road lines -->
  <rect x="120" y="248" width="60" height="12" rx="4" fill="#fff" opacity="0.8"/>
  <rect x="226" y="248" width="60" height="12" rx="4" fill="#ffdd00" opacity="0.9"/>
  <rect x="332" y="248" width="60" height="12" rx="4" fill="#fff" opacity="0.8"/>
  <!-- Car body -->
  <rect x="188" y="180" width="136" height="52" rx="10" fill="#e11d48"/>
  <rect x="202" y="155" width="108" height="48" rx="8" fill="#c0102e"/>
  <!-- Windshield -->
  <rect x="210" y="160" width="92" height="36" rx="5" fill="#aaddff" opacity="0.7"/>
  <!-- Wheels -->
  <circle cx="210" cy="232" r="18" fill="#111" stroke="#666" stroke-width="4"/>
  <circle cx="302" cy="232" r="18" fill="#111" stroke="#666" stroke-width="4"/>
  <circle cx="210" cy="232" r="8" fill="#888"/>
  <circle cx="302" cy="232" r="8" fill="#888"/>
  <!-- Headlights -->
  <rect x="318" y="192" width="14" height="8" rx="3" fill="white" opacity="0.95"/>
  <rect x="318" y="204" width="14" height="5" rx="2" fill="#88bbff" opacity="0.9"/>
  <!-- Speed lines -->
  <rect x="50" y="195" width="80" height="4" rx="2" fill="#e11d48" opacity="0.6"/>
  <rect x="50" y="215" width="60" height="3" rx="2" fill="#e11d48" opacity="0.4"/>
  <rect x="50" y="230" width="70" height="4" rx="2" fill="#e11d48" opacity="0.5"/>
  <!-- HR text -->
  <text x="256" y="360" font-family="Arial" font-weight="900" font-size="56" fill="white" text-anchor="middle" opacity="0.95">HR</text>
  <text x="256" y="400" font-family="Arial" font-weight="700" font-size="22" fill="#e11d48" text-anchor="middle">HIGHWAY RACER</text>
</svg>
